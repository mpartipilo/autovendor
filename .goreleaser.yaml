version: 2

project_name: autovendor

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: autovendor
    ldflags:
      - -s -w
      - -X github.com/mpartipilo/autovendor/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: mpartipilo
      name: homebrew-autovendor
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/mpartipilo/autovendor
    description: Automatic Go vendor sync after git operations
    license: MIT
    install: |
      bin.install "autovendor"
    test: |
      assert_match version.to_s, shell_output("#{bin}/autovendor version")

release:
  github:
    owner: mpartipilo
    name: autovendor
  header: |
    ## Installation

    **Homebrew:**
    ```sh
    brew install mpartipilo/autovendor/autovendor
    ```

    **Go install:**
    ```sh
    go install github.com/mpartipilo/autovendor@v{{ .Version }}
    ```

    **Download binary:**
    Download the archive for your platform below, extract, and place `autovendor` in your PATH.
  footer: |
    **Full changelog**: https://github.com/mpartipilo/autovendor/compare/{{ .PreviousTag }}...{{ .Tag }}
